<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Gestão Vovó Maria · Relatório do dia</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui,sans-serif;background:#F5F0E8;padding:18px;color:#431407}.container{max-width:760px;margin:0 auto;background:white;border-radius:28px;padding:20px;box-shadow:0 10px 24px rgba(0,0,0,.10)}.top{display:flex;align-items:center;gap:14px;margin-bottom:16px}.logo{width:82px;height:82px;object-fit:contain;border-radius:20px}h1{font-size:22px;color:#78350F}.sub{font-size:12px;color:#B45309;margin-top:2px}.status{padding:11px 13px;border-radius:16px;background:#FEF3C7;margin:12px 0 18px;font-size:13px;text-align:center;color:#92400E}.status.ok{background:#D1FAE5;color:#065F46}.status.err{background:#FEE2E2;color:#991B1B}.status.warn{background:#FEF3C7;color:#92400E}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.group{margin-bottom:13px}label{display:block;font-size:13px;font-weight:800;color:#6B2E0E;margin:0 0 6px 7px}input,select,textarea{width:100%;padding:12px 14px;border:2px solid #FCD8AF;border-radius:22px;font-size:14px;outline:none;background:white}textarea{border-radius:18px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:#F97316;box-shadow:0 0 0 3px rgba(249,115,22,.12)}.btn{width:100%;border:0;border-radius:999px;padding:13px;font-weight:900;cursor:pointer;margin-top:8px}.primary{background:#EA580C;color:white}.dark{background:#7C2D12;color:white}.soft{background:#FED7AA;color:#7C2D12}.muted{background:#E7E5E4;color:#44403C}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}.card{border:1px solid #FED7AA;border-radius:18px;padding:12px;margin-top:12px;background:#FFF7ED;font-size:13px}.card strong{color:#EA580C}.pill{display:inline-block;padding:3px 9px;border-radius:999px;background:#FFEDD5;color:#9A3412;font-size:11px;font-weight:800;margin-top:5px}.small{font-size:12px;color:#78716C}@media(max-width:620px){.grid2,.actions{grid-template-columns:1fr}.top{flex-direction:column;text-align:center}.logo{width:130px;height:130px}}
</style></head><body><div class="container"><div class="top"><img src="images/logo-vm-gestao.png" class="logo" alt="Gestão Vovó Maria"><div><h1>Relatório do dia</h1><div class="sub">Resumo simples para substituir o papel</div><div class="small" id="userInfo"></div></div></div><div class="grid2"><div class="group"><label>Data</label><input id="data" type="date"></div><div class="group"><label>&nbsp;</label><button class="btn primary" id="btnBuscar">Gerar relatório</button></div></div><div class="actions"><button class="btn soft" onclick="location.href='visita.html'">Registrar visita/venda</button><button class="btn dark" onclick="location.href='clientes.html'">Clientes</button></div><div id="statusMsg" class="status">Escolha a data e gere o relatório.</div><div id="resultado"></div></div><script>
const API_URL='https://gestaovvomaria-api.odir-bene12.workers.dev'; const token=localStorage.getItem('token'); const vendedorNome=localStorage.getItem('vendedorNome')||'Usuário'; if(!token){alert('Faça login primeiro.'); location.href='login.html';} document.getElementById('userInfo').textContent='Logado como: '+vendedorNome; document.getElementById('data').value=new Date().toISOString().slice(0,10);
function setStatus(msg,tipo='warn'){const el=document.getElementById('statusMsg');el.textContent=msg;el.className='status '+tipo;} function dinheiro(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
async function carregar(){try{const data=document.getElementById('data').value; const r=await fetch(API_URL+'/api/relatorio-dia?data='+data,{headers:{'Authorization':'Bearer '+token}}); const d=await r.json(); if(!r.ok) throw new Error(d.error||'Erro'); const res=d.resumo||{}; const produtos=(d.produtos||[]).map(p=>`<div class="card"><strong>${p.produto_nome}</strong><br>Qtd: ${p.quantidade} fardos · Total: ${dinheiro(p.total)}</div>`).join('')||'<div class="card">Nenhum produto lançado.</div>'; const visitas=(d.visitas||[]).map(v=>`<div class="card"><strong>${v.nome_fantasia||v.razao_social||'Cliente'}</strong><br>Comprou: ${v.comprou} · Valor: ${dinheiro(v.valor_total)}<br>${v.observacoes||''}<br><span class="pill">${v.vendedor_nome||''}</span></div>`).join('')||'<div class="card">Nenhuma visita registrada.</div>'; document.getElementById('resultado').innerHTML=`<div class="grid2"><div class="card"><strong>Visitas</strong><br>${res.visitas||0}</div><div class="card"><strong>Compraram</strong><br>${res.compras||0}</div><div class="card"><strong>Não compraram</strong><br>${res.sem_compra||0}</div><div class="card"><strong>Total estimado</strong><br>${dinheiro(res.valor_total)}</div></div><h3 style="margin-top:16px;color:#78350F">Produtos vendidos</h3>${produtos}<h3 style="margin-top:16px;color:#78350F">Visitas do dia</h3>${visitas}`; setStatus('Relatório gerado.','ok');}catch(e){setStatus(e.message,'err')}}
document.getElementById('btnBuscar').onclick=carregar; carregar();
</script></body></html>
